<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猜词义 · 设置</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", sans-serif;
        max-width: 640px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1f2328;
      }
      h1 { font-size: 20px; }
      h2 { font-size: 15px; margin-top: 28px; }
      label { display: block; margin: 12px 0 4px; font-size: 13px; color: #57606a; }
      input[type="text"], input[type="password"], select {
        width: 100%; box-sizing: border-box; padding: 8px 10px;
        border: 1px solid #d0d7de; border-radius: 6px; font: inherit;
      }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
      .row label { margin: 0; }
      button {
        margin-top: 16px; padding: 8px 16px; font: inherit; cursor: pointer;
        background: #2da44e; color: #fff; border: none; border-radius: 6px;
      }
      button:disabled { cursor: wait; opacity: 0.65; }
      .button-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .button-row .secondary { background: #57606a; }
      .hint { font-size: 12px; color: #bc4c00; background: #fff1e5;
        padding: 8px 10px; border-radius: 6px; margin-top: 8px; }
      .status { font-size: 13px; color: #1a7f37; margin-left: 12px; }
      .button-row .status { margin: 16px 0 0; }
      .status[data-state="pending"] { color: #57606a; }
      .status[data-state="error"] { color: #cf222e; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
      th, td { text-align: left; border-bottom: 1px solid #eaeef2; padding: 6px 4px; vertical-align: top; }
      .ok { color: #1a7f37; } .bad { color: #cf222e; } .muted { color: #57606a; }
    </style>
    <script type="module" crossorigin src="/assets/index.html-CJ1wOM87.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/index-siCKrX4B.js">
    <link rel="modulepreload" crossorigin href="/assets/store-BNAMznrQ.js">
  </head>
  <body>
    <h1>猜词义 · 设置</h1>

    <div class="hint">
      隐私提示：划词及其上下文会发送到你配置的 LLM 服务用于出题。未配置 API Key 时自动使用本地 mock 数据，不发送任何网络请求。
    </div>

    <h2>LLM 配置（用户自带 Key）</h2>
    <label for="apiKey">API Key（仅存于本机 chrome.storage.local，不上传）</label>
    <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

    <label for="apiBaseUrl">API Base URL（OpenAI 兼容）</label>
    <input id="apiBaseUrl" type="text" placeholder="https://api.openai.com/v1" />

    <label for="authMode">鉴权方式</label>
    <select id="authMode">
      <option value="bearer">Bearer Header（标准 OpenAI）</option>
      <option value="ak-query">Query 参数（?ak=...）</option>
    </select>

    <label for="model">模型</label>
    <input id="model" type="text" placeholder="gpt-4o-mini" />

    <label for="fallbackModels">备用模型（逗号分隔，主模型超时/不可用时按顺序降级）</label>
    <input id="fallbackModels" type="text" placeholder="model-a, model-b" />

    <label for="perRequestTimeoutMs">单次请求超时（毫秒，超时即切换下一个备用模型）</label>
    <input id="perRequestTimeoutMs" type="text" placeholder="28000" />

    <label for="glossLang">释义语言</label>
    <select id="glossLang">
      <option value="zh">中文</option>
      <option value="en">简单英文</option>
    </select>

    <div class="row">
      <input id="forceMock" type="checkbox" />
      <label for="forceMock">强制使用 mock 数据（演示用，即使配了 Key 也不调真实 LLM）</label>
    </div>

    <div class="row">
      <input id="degradeToMockOnError" type="checkbox" />
      <label for="degradeToMockOnError">真实 LLM 失败时自动降级到 mock 兜底（卡片会明确标识「降级·MOCK」）</label>
    </div>

    <div class="button-row">
      <button id="save">保存</button>
      <button id="testConnection" class="secondary">测试连接</button>
      <span id="status" class="status"></span>
      <span id="connectionStatus" class="status" role="status"></span>
    </div>

    <h2>最近记录（本地 IndexedDB）</h2>
    <table id="records">
      <thead>
        <tr><th>选词</th><th>正确义</th><th>作答</th><th>来源</th></tr>
      </thead>
      <tbody></tbody>
    </table>

  </body>
</html>
